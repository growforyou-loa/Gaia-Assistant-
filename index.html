<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#05071a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Gaia"/>
<link rel="manifest" href="manifest.json"/>
<title>Gaia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  /* Night sky palette */
  --sky-deep:   #05071a;
  --sky-mid:    #080c28;
  --sky-fade:   #0d1340;
  --moonlight:  rgba(200, 210, 255, 0.06);
  --moon-glow:  rgba(200, 215, 255, 0.12);

  /* Accent — cool moonlit blue-white + warm star gold */
  --moon:       #c8d5ff;
  --moon-2:     rgba(200, 213, 255, 0.55);
  --moon-3:     rgba(200, 213, 255, 0.28);
  --moon-4:     rgba(200, 213, 255, 0.14);
  --star-gold:  #ffe8a0;
  --star-warm:  #ffd080;

  /* Glass surfaces */
  --glass:      rgba(10, 14, 50, 0.65);
  --glass-2:    rgba(15, 20, 65, 0.55);
  --glass-rim:  rgba(200, 213, 255, 0.1);
  --glass-rim2: rgba(200, 213, 255, 0.18);

  /* Text */
  --t1: rgba(230, 235, 255, 0.95);
  --t2: rgba(200, 210, 255, 0.65);
  --t3: rgba(180, 195, 255, 0.35);
  --t4: rgba(160, 180, 255, 0.2);

  /* Status */
  --online:  #7ee8b8;
  --listen:  #ff8aaa;
  --think:   #ffe8a0;
  --speak:   #a0c4ff;

  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'Inter', system-ui, sans-serif;

  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --sidebar-w:   285px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  height: 100%; height: -webkit-fill-available;
  -webkit-text-size-adjust: 100%;
}
body {
  height: 100%; height: -webkit-fill-available;
  min-height: 100vh; min-height: -webkit-fill-available;
  width: 100%;
  background: var(--sky-deep);
  color: var(--t1);
  font-family: var(--font-body);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  position: fixed; inset: 0;
}

/* ═══════════════════════════════════════════════════
   NIGHT SKY CANVAS — stars live here
═══════════════════════════════════════════════════ */
#starCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* Deep night gradient base */
#nightBg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 30% 0%,   rgba(60, 80, 200, 0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 15%,  rgba(120, 100, 220, 0.1) 0%, transparent 55%),
    radial-gradient(ellipse 100% 60% at 50% 100%, rgba(5, 8, 35, 0.8) 0%, transparent 70%),
    linear-gradient(180deg, #05071a 0%, #080c28 40%, #060920 100%);
}

/* Moon — decorative, top right */
#moon {
  position: fixed; top: 60px; right: 28px; z-index: 1;
  width: 52px; height: 52px; border-radius: 50%;
  background: radial-gradient(circle at 38% 35%,
    #f8f4e8 0%, #e8e0c8 40%, #c8bca0 70%, #a89880 100%);
  box-shadow:
    0 0 20px rgba(248, 244, 232, 0.3),
    0 0 60px rgba(220, 210, 180, 0.15),
    0 0 100px rgba(200, 190, 160, 0.08);
  animation: moonGlow 6s ease-in-out infinite;
  pointer-events: none;
}
#moon::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle at 62% 65%,
    rgba(80, 60, 40, 0.25) 20%, transparent 60%);
}
@keyframes moonGlow {
  0%,100%{ box-shadow: 0 0 20px rgba(248,244,232,0.3), 0 0 60px rgba(220,210,180,0.15), 0 0 100px rgba(200,190,160,0.08); }
  50%    { box-shadow: 0 0 28px rgba(248,244,232,0.4), 0 0 80px rgba(220,210,180,0.22), 0 0 140px rgba(200,190,160,0.12); }
}

/* ═══════════════════════════════════════════════════
   SIDEBAR OVERLAY
═══════════════════════════════════════════════════ */
#sidebarOverlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(3, 5, 20, 0.7);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
#sidebarOverlay.open { opacity: 1; pointer-events: all; }

/* ═══════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════ */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w); z-index: 60;
  background: linear-gradient(180deg, #08102e 0%, #05071a 100%);
  border-right: 1px solid var(--glass-rim);
  transform: translateX(-100%);
  transition: transform 0.36s cubic-bezier(0.22,1,0.36,1);
  display: flex; flex-direction: column;
  padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
  overflow: hidden;
}
#sidebar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 260px;
  background: radial-gradient(ellipse at top, rgba(100, 120, 255, 0.08) 0%, transparent 70%);
  pointer-events: none;
}
#sidebar.open { transform: translateX(0); }

.sb-header {
  padding: 24px 18px 18px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; border-bottom: 1px solid var(--glass-rim);
}
.sb-brand-name {
  font-family: var(--font-display);
  font-size: 22px; font-style: italic; font-weight: 400;
  color: var(--moon); letter-spacing: 0.3px;
}
.sb-close {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--glass-rim); background: transparent;
  color: var(--t3); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.sb-close:active { background: var(--moonlight); color: var(--t1); }
.sb-close svg { width:14px; height:14px; }

.sb-new-chat {
  margin: 14px 14px 6px; padding: 12px 16px;
  background: rgba(200, 213, 255, 0.06);
  border: 1px solid var(--glass-rim2); border-radius: 12px;
  color: var(--moon); font-family: var(--font-body);
  font-size: 14px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  transition: all 0.2s; flex-shrink: 0;
}
.sb-new-chat:active { background: rgba(200,213,255,0.1); }
.sb-new-chat svg { width:15px; height:15px; flex-shrink:0; }

.sb-section-label {
  padding: 12px 18px 5px;
  font-size: 10px; font-weight: 500; letter-spacing: 2px;
  text-transform: uppercase; color: var(--t3); flex-shrink: 0;
}
#chatList { flex:1; overflow-y:auto; padding:4px 10px 12px; scrollbar-width:none; }
#chatList::-webkit-scrollbar { display:none; }

.chat-item {
  padding: 11px 10px; border-radius: 10px; cursor: pointer;
  transition: background 0.18s; margin-bottom: 3px;
  display: flex; align-items: center; gap: 10px;
}
.chat-item:active { background: var(--moonlight); }
.chat-item.active {
  background: rgba(200, 213, 255, 0.07);
  border: 1px solid var(--glass-rim);
}
.chat-item-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--t3); flex-shrink: 0;
}
.chat-item.active .chat-item-dot { background: var(--moon); box-shadow: 0 0 6px var(--moon); }
.chat-item-text { flex:1; overflow:hidden; }
.chat-item-preview {
  font-size: 13px; font-weight: 400; color: var(--t2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-item-time { font-size: 11px; color: var(--t3); margin-top: 2px; }
.chat-item.active .chat-item-preview { color: var(--moon); }

.sb-empty { text-align:center; padding:40px 16px; color:var(--t3); font-size:13px; line-height:1.8; }
.sb-empty-star { font-size: 28px; margin-bottom: 12px; opacity: 0.5; }

.sb-footer { padding:14px 18px; border-top:1px solid var(--glass-rim); flex-shrink:0; }
.sb-footer span { font-size:11px; color:var(--t4); }
.sb-footer a { color:var(--t3); text-decoration:none; }

/* ═══════════════════════════════════════════════════
   APP SHELL — headerless
═══════════════════════════════════════════════════ */
#app {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column;
  max-width: 520px; margin: 0 auto; left: 0; right: 0;
}

/* ═══════════════════════════════════════════════════
   FLOATING TOP BAR — ultra minimal, no header feel
═══════════════════════════════════════════════════ */
#topBar {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(var(--safe-top) + 14px) 18px 0;
  pointer-events: none;
}

/* Hamburger — ghost button, floats over content */
#menuBtn {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1px solid var(--glass-rim);
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  color: var(--moon-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.25s;
  -webkit-tap-highlight-color: transparent;
  pointer-events: all;
}
#menuBtn:active { background: var(--glass-2); color: var(--moon); }
#menuBtn svg { width:16px; height:16px; pointer-events:none; }

/* Top right — status + time, floating */
.top-right {
  display: flex; align-items: center; gap: 10px;
  pointer-events: none;
}
.status-dot-wrap {
  display: flex; align-items: center; gap: 6px;
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-rim);
  padding: 6px 11px; border-radius: 20px;
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--online); box-shadow: 0 0 6px var(--online);
  animation: starPulse 3s ease-in-out infinite;
}
@keyframes starPulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.3;transform:scale(0.6);} }
.live-dot.listening { background:var(--listen); box-shadow:0 0 8px var(--listen); animation:fastPulse 0.5s infinite; }
.live-dot.thinking  { background:var(--think);  box-shadow:0 0 8px var(--think);  animation:fastPulse 0.6s infinite; }
.live-dot.speaking  { background:var(--speak);  box-shadow:0 0 8px var(--speak);  animation:fastPulse 0.35s infinite; }
@keyframes fastPulse { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
#stateLabel { font-size:11px; font-weight:500; color:var(--t2); }

#clockDisplay {
  font-size: 13px; font-weight: 400; color: var(--t2);
  background: var(--glass);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--glass-rim);
  padding: 6px 12px; border-radius: 20px;
  letter-spacing: 0.5px;
}

#boldBadge {
  display: none; padding: 5px 11px; border-radius: 20px;
  background: rgba(255, 120, 150, 0.1); border: 1px solid rgba(255, 120, 150, 0.25);
  font-size: 10px; font-weight: 600; color: var(--listen); text-transform: uppercase;
  letter-spacing: 1px; animation: boldGlow 2s ease-in-out infinite;
  backdrop-filter: blur(16px);
}
#boldBadge.show { display: block; }
@keyframes boldGlow { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

/* ═══════════════════════════════════════════════════
   CHAT AREA — full bleed, no borders
═══════════════════════════════════════════════════ */
#chatArea {
  flex: 1;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
  padding: calc(var(--safe-top) + 80px) 16px 12px;
  display: flex; flex-direction: column;
  scroll-behavior: smooth;
  scrollbar-width: none;
}
#chatArea::-webkit-scrollbar { display: none; }

/* Messages */
.msg-wrap {
  display: flex; flex-direction: column; margin-bottom: 22px;
  animation: msgIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes msgIn { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
.msg-wrap.user { align-items: flex-end; }
.msg-wrap.gaia { align-items: flex-start; }

/* No sender labels — cleaner without header */
.msg-sender { display: none; }

/* Bubbles */
.msg-bubble {
  position: relative; max-width: 82%;
  padding: 14px 18px; font-size: 15px;
  line-height: 1.7; font-weight: 400; word-break: break-word;
}

/* User bubble — warm moonlit right */
.msg-wrap.user .msg-bubble {
  background: rgba(200, 213, 255, 0.1);
  border: 1px solid rgba(200, 213, 255, 0.18);
  border-radius: 20px 5px 20px 20px;
  color: var(--t1);
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
}

/* Gaia bubble — deeper, left */
.msg-wrap.gaia .msg-bubble {
  background: rgba(8, 14, 50, 0.7);
  border: 1px solid var(--glass-rim2);
  border-radius: 5px 20px 20px 20px;
  color: rgba(220, 230, 255, 0.9);
  box-shadow: 0 4px 28px rgba(0,0,0,0.35);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
}
/* Subtle shimmer on gaia bubble */
.msg-wrap.gaia .msg-bubble::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:1px;
  background: linear-gradient(90deg, rgba(200,213,255,0.25), rgba(200,213,255,0.08) 60%, transparent);
  border-radius: 5px 20px 0 0;
}

.msg-bubble p { margin-bottom: 10px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble strong { color: rgba(230,238,255,0.98); font-weight: 600; }
.msg-bubble .section-head {
  font-family: var(--font-display); font-style: italic;
  font-size: 13px; color: var(--moon); margin: 14px 0 6px;
  padding-bottom: 5px; border-bottom: 1px solid var(--glass-rim);
}
.msg-bubble .section-head:first-child { margin-top: 0; }
.msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin-bottom: 10px; }
.msg-bubble li { margin-bottom: 5px; }
.msg-bubble code {
  font-size: 12px; background: rgba(200,213,255,0.07);
  border: 1px solid var(--glass-rim); padding: 2px 6px; border-radius: 5px;
  color: var(--moon); font-family: 'Courier New', monospace;
}

/* Action pill */
.action-tag {
  display: inline-flex; align-items: center; gap: 7px; margin-top: 10px;
  padding: 7px 13px;
  background: rgba(255, 232, 160, 0.07);
  border: 1px solid rgba(255, 232, 160, 0.2); border-radius: 20px;
  font-size: 12px; font-weight: 500; color: var(--star-gold); cursor: pointer;
  transition: background 0.2s;
}
.action-tag:active { background: rgba(255,232,160,0.14); }
.action-tag svg { width:12px; height:12px; flex-shrink:0; }

/* Timestamp — barely visible */
.msg-time { font-size: 10px; color: var(--t4); margin-top: 4px; padding: 0 5px; }

/* Thinking */
.thinking-bubble {
  background: rgba(8,14,50,0.65); border: 1px solid var(--glass-rim);
  border-radius: 5px 20px 20px 20px; padding: 16px 20px;
  display: flex; align-items: center; gap: 7px;
  backdrop-filter: blur(16px);
}
.thinking-bubble span {
  width: 7px; height: 7px; border-radius: 50%;
  animation: nightBounce 1.6s ease-in-out infinite;
}
.thinking-bubble span:nth-child(1) { background: var(--moon);      animation-delay: 0s; }
.thinking-bubble span:nth-child(2) { background: var(--star-warm); animation-delay: 0.22s; }
.thinking-bubble span:nth-child(3) { background: var(--moon);      animation-delay: 0.44s; }
@keyframes nightBounce { 0%,80%,100%{transform:translateY(0);opacity:0.3;} 40%{transform:translateY(-9px);opacity:1;} }

/* ═══════════════════════════════════════════════════
   WELCOME SCREEN
═══════════════════════════════════════════════════ */
#welcomeScreen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  padding: 80px 20px 20px; height: 100%; min-height: 100%;
  animation: welcomeIn 1s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes welcomeIn { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

/* Moon orb for welcome */
.welcome-moon {
  position: relative; margin-bottom: 30px;
}
.welcome-moon-orb {
  width: 82px; height: 82px; border-radius: 50%;
  background: radial-gradient(circle at 38% 35%,
    #f2eedd 0%, #ddd3b8 50%, #b8a888 80%, #9a8860 100%);
  box-shadow:
    0 0 24px rgba(242,238,221,0.35),
    0 0 60px rgba(220,205,165,0.2),
    0 0 100px rgba(200,185,145,0.1);
  animation: welcomeFloat 4.5s ease-in-out infinite;
  position: relative; z-index: 1;
}
.welcome-moon-orb::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle at 62% 68%, rgba(60,40,20,0.2) 20%, transparent 60%);
}
.moon-halo {
  position: absolute; inset: -14px; border-radius: 50%;
  border: 1px solid rgba(242,238,221,0.15);
  animation: haloExpand 4.5s ease-in-out infinite;
}
.moon-halo-2 {
  position: absolute; inset: -26px; border-radius: 50%;
  border: 1px solid rgba(242,238,221,0.07);
  animation: haloExpand 4.5s ease-in-out infinite 0.6s;
}
@keyframes welcomeFloat { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
@keyframes haloExpand   { 0%,100%{transform:scale(1);opacity:0.7;} 50%{transform:scale(1.05);opacity:0.2;} }

.welcome-greeting {
  font-family: var(--font-display);
  font-size: 34px; font-weight: 400; font-style: italic;
  color: var(--t1); margin-bottom: 8px; line-height: 1.15;
}
.welcome-greeting span {
  color: var(--moon); font-style: normal; font-weight: 500;
}
.welcome-tagline {
  font-size: 11px; font-weight: 400; letter-spacing: 3px;
  text-transform: uppercase; color: var(--t3); margin-bottom: 16px;
}
.welcome-desc {
  font-size: 14px; line-height: 1.8; color: var(--t2);
  max-width: 290px; margin-bottom: 30px; font-weight: 300;
}

/* Capability cards */
.cap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 340px; }
.cap-card {
  background: var(--glass); border: 1px solid var(--glass-rim);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-radius: 16px; padding: 15px 13px;
  text-align: left; cursor: pointer; transition: all 0.22s;
}
.cap-card:active { background: var(--glass-2); border-color: var(--glass-rim2); transform: scale(0.96); }
.cap-icon {
  width: 30px; height: 30px; border-radius: 50%; margin-bottom: 10px;
  background: rgba(200,213,255,0.08); border: 1px solid var(--glass-rim);
  display: flex; align-items: center; justify-content: center;
}
.cap-icon svg { width:14px; height:14px; color:var(--moon-2); }
.cap-label { font-size: 12px; font-weight: 600; color: var(--t1); margin-bottom: 3px; }
.cap-desc  { font-size: 10.5px; color: var(--t3); line-height: 1.5; font-weight: 400; }

/* ═══════════════════════════════════════════════════
   COMPOSER — floating above the night
═══════════════════════════════════════════════════ */
#composer {
  flex-shrink: 0;
  padding: 10px 14px;
  padding-bottom: calc(var(--safe-bottom) + 8px);
  background: rgba(5, 8, 30, 0.8);
  backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
  border-top: 1px solid var(--glass-rim);
  position: relative;
}
/* Top shimmer line */
#composer::before {
  content: '';
  position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,213,255,0.3), transparent);
}

/* Voice bars */
#voiceBar { height: 30px; margin-bottom: 7px; display:none; align-items:center; justify-content:center; gap:3px; }
#voiceBar.active { display: flex; }
.vbar { width:3px; border-radius:3px; background:var(--moon-3); animation:starDance 0.9s ease-in-out infinite; transform-origin:bottom; }
.vbar:nth-child(odd)  { background: var(--moon-3); }
.vbar:nth-child(even) { background: rgba(255,232,160,0.3); }
.vbar:nth-child(1){height:7px;  animation-delay:0s;}
.vbar:nth-child(2){height:14px; animation-delay:0.07s;}
.vbar:nth-child(3){height:22px; animation-delay:0.14s;}
.vbar:nth-child(4){height:16px; animation-delay:0.21s;}
.vbar:nth-child(5){height:26px; animation-delay:0.28s;}
.vbar:nth-child(6){height:18px; animation-delay:0.35s;}
.vbar:nth-child(7){height:13px; animation-delay:0.42s;}
.vbar:nth-child(8){height:22px; animation-delay:0.49s;}
.vbar:nth-child(9){height:9px;  animation-delay:0.56s;}
@keyframes starDance { 0%,100%{transform:scaleY(0.25);opacity:0.4;} 50%{transform:scaleY(1);opacity:1;} }

#transcriptStrip {
  font-size: 12px; font-weight: 400; color: var(--moon-2); text-align: center;
  padding: 0 8px 6px; min-height: 18px; opacity: 0; transition: opacity 0.3s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-style: italic;
}
#transcriptStrip.show { opacity: 1; }

.input-row { display: flex; align-items: flex-end; gap: 9px; }

#textInput {
  flex: 1;
  background: rgba(200, 213, 255, 0.06);
  border: 1px solid var(--glass-rim);
  border-radius: 24px; padding: 13px 20px;
  font-family: var(--font-body); font-size: 15px; font-weight: 400;
  color: var(--t1); outline: none; resize: none;
  min-height: 48px; max-height: 120px; line-height: 1.5; overflow-y: auto;
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  scrollbar-width: none; -webkit-appearance: none;
}
#textInput::-webkit-scrollbar { display: none; }
#textInput::placeholder { color: var(--t3); font-weight: 300; }
#textInput:focus {
  border-color: rgba(200,213,255,0.3);
  background: rgba(200,213,255,0.09);
  box-shadow: 0 0 0 3px rgba(200,213,255,0.06);
}

/* Buttons */
.act-btn {
  width: 48px; height: 48px; border-radius: 50%;
  border: 1px solid var(--glass-rim); background: rgba(200,213,255,0.06);
  color: var(--moon-3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; -webkit-tap-highlight-color: transparent;
}
.act-btn svg { width:19px; height:19px; pointer-events:none; }
.act-btn:active { transform: scale(0.88); }

/* Send — moonlight glow */
.act-btn.send {
  background: rgba(200, 213, 255, 0.12);
  border-color: rgba(200, 213, 255, 0.28);
  color: var(--moon);
  box-shadow: 0 0 20px rgba(200,213,255,0.15), 0 4px 16px rgba(0,0,0,0.3);
}
.act-btn.send:active { box-shadow: 0 0 30px rgba(200,213,255,0.25); }

/* Mic active */
.act-btn.mic-btn.active {
  background: rgba(255,138,170,0.12);
  border-color: rgba(255,138,170,0.35); color: var(--listen);
  box-shadow: 0 0 18px rgba(255,138,170,0.2);
  animation: micNight 0.7s ease-in-out infinite;
}
@keyframes micNight { 0%,100%{box-shadow:0 0 16px rgba(255,138,170,0.2);} 50%{box-shadow:0 0 28px rgba(255,138,170,0.45);} }

/* Quick chips */
#quickStrip { display:flex; gap:7px; margin-top:9px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
#quickStrip::-webkit-scrollbar { display:none; }
.q-chip {
  flex-shrink:0; display:flex; align-items:center; gap:6px; padding:6px 13px;
  border-radius:20px; background:rgba(200,213,255,0.05); border:1px solid var(--glass-rim);
  font-size:12px; font-weight:400; color:var(--t2); cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
}
.q-chip svg { width:11px; height:11px; flex-shrink:0; }
.q-chip:active { border-color:rgba(200,213,255,0.25); color:var(--moon); background:rgba(200,213,255,0.09); }

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
#toast {
  position: fixed; bottom: 110px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(8,12,40,0.95); border: 1px solid var(--glass-rim2);
  padding: 10px 20px; border-radius: 24px;
  font-size: 13px; font-weight: 400; color: var(--moon);
  opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s;
  z-index: 200; white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  max-width: calc(100vw - 40px); overflow: hidden; text-overflow: ellipsis;
  backdrop-filter: blur(20px);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (min-width: 521px) {
  #sidebar { left: calc(50% - 260px - var(--sidebar-w)); }
  #app { border-left: 1px solid var(--glass-rim); border-right: 1px solid var(--glass-rim); }
}
</style>
</head>
<body>

<!-- Night sky layers -->
<div id="nightBg"></div>
<canvas id="starCanvas"></canvas>
<div id="moon"></div>
<div id="toast"></div>

<!-- Sidebar -->
<div id="sidebarOverlay" onclick="closeSidebar()"></div>
<div id="sidebar">
  <div class="sb-header">
    <span class="sb-brand-name">Gaia</span>
    <button class="sb-close" onclick="closeSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <button class="sb-new-chat" onclick="startNewChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    New Conversation
  </button>
  <div class="sb-section-label">Recent</div>
  <div id="chatList">
    <div class="sb-empty">
      <div class="sb-empty-star">✦</div>
      No conversations yet.<br>Ask Gaia anything.
    </div>
  </div>
  <div class="sb-footer"><span>Gaia · <a href="https://growforyou.in" target="_blank">growforyou.in</a></span></div>
</div>

<!-- App -->
<div id="app">

  <!-- Floating top bar (no header) -->
  <div id="topBar">
    <button id="menuBtn" onclick="openSidebar()" aria-label="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <line x1="3" y1="7" x2="21" y2="7"/>
        <line x1="3" y1="12" x2="17" y2="12"/>
        <line x1="3" y1="17" x2="21" y2="17"/>
      </svg>
    </button>
    <div class="top-right">
      <div id="boldBadge">Bold</div>
      <div class="status-dot-wrap">
        <div class="live-dot" id="liveDot"></div>
        <span id="stateLabel">Online</span>
      </div>
      <div id="clockDisplay">00:00</div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chatArea">
    <div id="welcomeScreen">
      <div class="welcome-moon">
        <div class="moon-halo"></div>
        <div class="moon-halo-2"></div>
        <div class="welcome-moon-orb"></div>
      </div>
      <div class="welcome-greeting">Welcome back, <span>Gajanan</span></div>
      <div class="welcome-tagline">Gaia · Personal Intelligence</div>
      <div class="welcome-desc">I can answer anything, search the web, make calls, set alarms, play music, navigate, and much more.</div>
      <div class="cap-grid" id="capGrid"></div>
    </div>
  </div>

  <!-- Composer -->
  <div id="composer">
    <div id="voiceBar">
      <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
      <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
      <div class="vbar"></div><div class="vbar"></div><div class="vbar"></div>
    </div>
    <div id="transcriptStrip"></div>
    <div class="input-row">
      <textarea id="textInput" placeholder="Ask me anything…" rows="1" autocomplete="off" spellcheck="false"></textarea>
      <button class="act-btn mic-btn" id="micBtn" onclick="toggleMic()" title="Voice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <button class="act-btn send" onclick="sendText()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div id="quickStrip"></div>
  </div>

</div>

<script>
'use strict';

const CFG = {
  backend:    'https://gaia-assistant-i5um.onrender.com',
  owner:      'Gajanan',
  assistant:  'Gaia',
  maxHistory: 50,
};

let recognition = null, isListening = false, isSpeaking = false;
let chatHistory = [], voiceReady = false, selectedVoice = null;
let welcomed = false, boldMode = false;
let sessions = [], currentSessId = null;

const CAPS = [
  { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`, label:'Search & Browse', desc:'Web search, open any site', cmd:'Search latest tech news' },
  { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 5.45 5.45l1.8-1.8a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/></svg>`, label:'Calls & Messages', desc:'Phone calls, WhatsApp', cmd:'Call 9876543210' },
  { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`, label:'Alarms & Timers', desc:'Alarms, countdowns, reminders', cmd:'Set alarm for 7 AM tomorrow' },
  { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`, label:'Voice & Music', desc:'Speak freely, play music', cmd:'Play something relaxing' },
];

const QUICK = [
  { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`, label:'Weather', cmd:'What is the weather today' },
  { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`, label:'Search', cmd:'Search latest news today' },
  { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m3 11 19-9-9 19-2-8-8-2z"/></svg>`, label:'Navigate', cmd:'Navigate to nearest hospital' },
  { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`, label:'Email', cmd:'Help me write an email' },
  { icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`, label:'Ask anything', cmd:'Tell me something interesting' },
];

/* ── Sidebar ──────────────────────────────────────────── */
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
  renderChatList();
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function renderChatList() {
  const list = document.getElementById('chatList');
  if (!sessions.length) {
    list.innerHTML = `<div class="sb-empty"><div class="sb-empty-star">✦</div>No conversations yet.<br>Ask Gaia anything.</div>`;
    return;
  }
  list.innerHTML = '';
  [...sessions].reverse().forEach(s => {
    const item = document.createElement('div');
    item.className = 'chat-item' + (s.id === currentSessId ? ' active' : '');
    item.innerHTML = `<div class="chat-item-dot"></div><div class="chat-item-text"><div class="chat-item-preview">${escHtml(s.title||'New Chat')}</div><div class="chat-item-time">${formatChatTime(s.timestamp)}</div></div>`;
    item.onclick = () => loadSession(s.id);
    list.appendChild(item);
  });
}

function formatChatTime(ts) {
  const d = new Date(ts), now = new Date(), mins = Math.floor((now-d)/60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if (hrs < 24) return `${hrs}h ago`;
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}

function startNewChat() {
  if (chatHistory.length > 0 && currentSessId) {
    const s = sessions.find(s => s.id === currentSessId);
    if (s) { s.history=[...chatHistory]; s.boldMode=boldMode; }
  }
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  const ws = document.createElement('div');
  ws.id = 'welcomeScreen';
  ws.innerHTML = buildWelcomeHTML();
  area.appendChild(ws);
  buildCapCards();
  chatHistory=[]; boldMode=false; welcomed=false;
  currentSessId='sess_'+Date.now();
  updateBoldBadge(); setState('idle'); closeSidebar();
}

function buildWelcomeHTML() {
  return `<div class="welcome-moon"><div class="moon-halo"></div><div class="moon-halo-2"></div><div class="welcome-moon-orb"></div></div><div class="welcome-greeting">Good evening, <span>Gajanan</span></div><div class="welcome-tagline">Gaia · Personal Intelligence</div><div class="welcome-desc">I can answer anything, search the web, make calls, set alarms, play music, navigate, and much more.</div><div class="cap-grid" id="capGrid"></div>`;
}

function loadSession(id) {
  if (chatHistory.length > 0 && currentSessId) {
    const cur = sessions.find(s => s.id === currentSessId);
    if (cur) { cur.history=[...chatHistory]; cur.boldMode=boldMode; }
  }
  const sess = sessions.find(s => s.id === id);
  if (!sess) return;
  currentSessId=id; chatHistory=[...(sess.history||[])]; boldMode=sess.boldMode||false; welcomed=true;
  const area = document.getElementById('chatArea');
  area.innerHTML = '';
  (sess.messages||[]).forEach(m => {
    if (m.role==='user') addUserMessageDirect(m.content, m.time);
    else if (m.role==='gaia') addGaiaMessageDirect(m.data, m.time);
  });
  updateBoldBadge(); closeSidebar(); scrollBottom();
}

/* ── Init ─────────────────────────────────────────────── */
window.addEventListener('load', () => {
  initClock(); initStars(); initSpeech(); initVoiceRecog();
  buildCapCards(); buildQuickChips(); autoResizeTextarea();
  currentSessId = 'sess_' + Date.now();
  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });
  if (/iPhone|iPad/.test(navigator.userAgent)) {
    window.visualViewport && window.visualViewport.addEventListener('resize', () => {
      document.getElementById('app').style.height = window.visualViewport.height + 'px';
    });
  }
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
});

function initClock() {
  const tick = () => {
    const n = new Date();
    document.getElementById('clockDisplay').textContent =
      `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  };
  tick(); setInterval(tick, 15000);
}

/* ── Star Field ───────────────────────────────────────── */
function initStars() {
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  const resize = () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  };
  resize(); window.addEventListener('resize', resize);

  // Create star layers — tiny, small, medium, occasional sparkler
  const stars = [];
  const count = Math.min(Math.floor(W * H / 900), 280);

  for (let i = 0; i < count; i++) {
    const type = Math.random();
    stars.push({
      x:    Math.random() * W,
      y:    Math.random() * H,
      // Different size classes
      r:    type < 0.6 ? Math.random() * 0.6 + 0.2    // tiny
          : type < 0.88 ? Math.random() * 0.9 + 0.5   // small
          : type < 0.97 ? Math.random() * 1.2 + 0.9   // medium
          : Math.random() * 1.6 + 1.4,                 // bright
      // Drift speed — very slow rightward drift + tiny vertical
      vx:   (Math.random() * 0.06 + 0.01) * (Math.random() > 0.5 ? 1 : -0.3),
      vy:   (Math.random() - 0.5) * 0.015,
      // Twinkle phase
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.012 + 0.004,
      // Base opacity
      base:  Math.random() * 0.5 + 0.25,
      // Color — mostly white-blue, occasionally warm
      warm:  Math.random() < 0.15,
    });
  }

  // A few special sparkler stars
  const sparklers = [];
  for (let i = 0; i < 6; i++) {
    sparklers.push({
      x: Math.random() * W, y: Math.random() * H * 0.65,
      phase: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.018 + 0.01,
      r: Math.random() * 1.0 + 1.8,
    });
  }

  let t = 0;

  const draw = () => {
    ctx.clearRect(0, 0, W, H);
    t += 1;

    // Draw regular stars
    stars.forEach(s => {
      // Twinkle
      const twinkle = Math.sin(s.phase + t * s.speed);
      const alpha = s.base + twinkle * 0.28;

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);

      if (s.warm) {
        ctx.fillStyle = `rgba(255, 240, 180, ${Math.max(0.05, alpha)})`;
      } else {
        ctx.fillStyle = `rgba(210, 225, 255, ${Math.max(0.05, alpha)})`;
      }
      ctx.fill();

      // Slow drift
      s.x += s.vx; s.y += s.vy;
      if (s.x > W + 2) s.x = -2;
      if (s.x < -2)    s.x = W + 2;
      if (s.y > H + 2) s.y = -2;
      if (s.y < -2)    s.y = H + 2;
    });

    // Draw sparklers — 4-point cross glow
    sparklers.forEach(s => {
      const glow = 0.5 + 0.5 * Math.sin(s.phase + t * s.speed);
      const alpha = glow * 0.9;
      const sz = s.r * (0.7 + glow * 0.6);

      // Core dot
      ctx.beginPath();
      ctx.arc(s.x, s.y, sz * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(235, 245, 255, ${alpha})`;
      ctx.fill();

      // Cross rays
      ctx.strokeStyle = `rgba(220, 235, 255, ${alpha * 0.6})`;
      ctx.lineWidth = 0.5;
      const ray = sz * 2.5;
      ctx.beginPath();
      ctx.moveTo(s.x - ray, s.y); ctx.lineTo(s.x + ray, s.y);
      ctx.moveTo(s.x, s.y - ray); ctx.lineTo(s.x, s.y + ray);
      ctx.stroke();

      // Outer glow
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sz * 4);
      grad.addColorStop(0, `rgba(220, 235, 255, ${alpha * 0.25})`);
      grad.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.arc(s.x, s.y, sz * 4, 0, Math.PI * 2);
      ctx.fillStyle = grad; ctx.fill();
    });

    requestAnimationFrame(draw);
  };
  draw();
}

/* ── Caps & Chips ─────────────────────────────────────── */
function buildCapCards() {
  const grid = document.getElementById('capGrid');
  if (!grid) return;
  grid.innerHTML = '';
  CAPS.forEach(cap => {
    const card = document.createElement('div');
    card.className = 'cap-card';
    card.innerHTML = `<div class="cap-icon">${cap.icon}</div><div class="cap-label">${cap.label}</div><div class="cap-desc">${cap.desc}</div>`;
    card.onclick = () => processCommand(cap.cmd);
    grid.appendChild(card);
  });
}

function buildQuickChips() {
  const strip = document.getElementById('quickStrip');
  QUICK.forEach(q => {
    const chip = document.createElement('button');
    chip.className = 'q-chip';
    chip.innerHTML = `${q.icon}<span>${q.label}</span>`;
    chip.onclick = () => processCommand(q.cmd);
    strip.appendChild(chip);
  });
}

function autoResizeTextarea() {
  const el = document.getElementById('textInput');
  el.addEventListener('input', () => {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  });
}

function updateBoldBadge() {
  document.getElementById('boldBadge').classList.toggle('show', boldMode);
}

/* ── TTS ──────────────────────────────────────────────── */
function initSpeech() {
  const set = () => {
    const vs = speechSynthesis.getVoices();
    selectedVoice = vs.find(v=>/samantha|karen|victoria|moira|female|woman|zira/i.test(v.name)&&/en/i.test(v.lang))
      || vs.find(v=>/en-us|en-gb|en-in/i.test(v.lang)) || vs[0] || null;
    voiceReady = true;
  };
  set(); speechSynthesis.onvoiceschanged = set;
}

function speak(text) {
  if (!text || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  if (selectedVoice) utt.voice = selectedVoice;
  utt.rate=1.05; utt.pitch=1.0; utt.volume=1.0;
  utt.onstart = () => { isSpeaking=true; setState('speaking'); };
  utt.onend = utt.onerror = () => { isSpeaking=false; setState('idle'); };
  speechSynthesis.speak(utt);
}

/* ── STT ──────────────────────────────────────────────── */
function initVoiceRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Voice not available in this browser'); return; }
  recognition = new SR();
  recognition.lang='en-IN'; recognition.continuous=false;
  recognition.interimResults=true; recognition.maxAlternatives=1;
  recognition.onstart = () => {
    isListening=true; setState('listening');
    document.getElementById('voiceBar').classList.add('active');
    document.getElementById('micBtn').classList.add('active');
    setTranscript('Listening…');
  };
  recognition.onresult = e => {
    let interim='', final='';
    for (let i=e.resultIndex; i<e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final+=t) : (interim+=t);
    }
    setTranscript(final||interim);
    if (final) processCommand(final.trim());
  };
  recognition.onerror = e => {
    stopListening();
    if (e.error!=='no-speech'&&e.error!=='aborted') showToast('Mic error: '+e.error);
  };
  recognition.onend = stopListening;
}

function stopListening() {
  isListening=false; setState('idle');
  document.getElementById('voiceBar').classList.remove('active');
  document.getElementById('micBtn').classList.remove('active');
  setTimeout(() => setTranscript(''), 1200);
}

function toggleMic() {
  if (!recognition) { showToast('Voice not supported in this browser'); return; }
  if (isListening) recognition.abort();
  else { if (isSpeaking) speechSynthesis.cancel(); try { recognition.start(); } catch(e){} }
}

/* ── Core Flow ────────────────────────────────────────── */
async function sendText() {
  const el = document.getElementById('textInput'), text = el.value.trim();
  if (!text) return;
  el.value=''; el.style.height='';
  processCommand(text);
}

async function processCommand(text) {
  if (!text) return;
  hideWelcome(); addUserMessage(text); setState('thinking');
  const thinkId = addThinking();
  try {
    const res = await fetch(`${CFG.backend}/command`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ text, history:chatHistory.slice(-CFG.maxHistory), owner:CFG.owner, bold_mode:boldMode })
    });
    removeThinking(thinkId);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (typeof data.bold_mode === 'boolean') { boldMode=data.bold_mode; updateBoldBadge(); }
    chatHistory.push({role:'user', content:text});
    chatHistory.push({role:'assistant', content:data.speak||data.display||''});
    if (chatHistory.length > CFG.maxHistory) chatHistory = chatHistory.slice(-CFG.maxHistory);
    updateCurrentSession(text, data);
    addGaiaMessage(data); speak(data.speak);
    setTimeout(() => handleAction(data.action, data.value), 900);
  } catch(err) {
    removeThinking(thinkId);
    const fb = { speak:"Can't reach the server right now. Please check your connection.", display:"Connection error — make sure the backend is running and CFG.backend is correct." };
    addGaiaMessage(fb); speak(fb.speak); setState('idle');
  }
}

function updateCurrentSession(userText, gaiaData) {
  let sess = sessions.find(s => s.id === currentSessId);
  if (!sess) {
    sess = { id:currentSessId, title:userText.slice(0,45), history:[], messages:[], timestamp:Date.now(), boldMode:false };
    sessions.push(sess);
  }
  sess.history=[...chatHistory]; sess.boldMode=boldMode; sess.timestamp=Date.now();
  sess.messages=sess.messages||[];
  if (sess.messages.length===0) sess.title=userText.slice(0,45);
  sess.messages.push({role:'user', content:userText, time:nowTime()});
  sess.messages.push({role:'gaia', data:gaiaData, time:nowTime()});
}

function handleAction(action, value) {
  if (!action||action==='none'||!value) return;
  switch(action) {
    case 'open_url': window.open(value.startsWith('http')?value:`https://${value}`,'_blank'); break;
    case 'search': window.open(`https://www.google.com/search?q=${encodeURIComponent(value)}`,'_blank'); break;
    case 'call': window.location.href=`tel:${value.replace(/[^0-9+]/g,'')}`; break;
    case 'send_whatsapp': window.open(`https://wa.me/${value.replace(/[^0-9+]/g,'')}`,'_blank'); break;
    case 'send_sms': window.location.href=`sms:${value.replace(/[^0-9+]/g,'')}`; break;
    case 'alarm':
      showToast('Alarm: '+value);
      try { window.location.href=`intent://alarm?hour=${parseAlarmHour(value)}&minutes=${parseAlarmMin(value)}&message=Gaia#Intent;scheme=android-app;package=com.google.android.deskclock;end`; }
      catch(e) { showToast('Set alarm: '+value); } break;
    case 'timer': {
      const s=parseInt(value)||60;
      try { window.location.href=`intent://timer?seconds=${s}#Intent;scheme=android-app;package=com.google.android.deskclock;end`; } catch(e){}
      showToast('Timer: '+s+'s'); break; }
    case 'music': window.open(`https://open.spotify.com/search/${encodeURIComponent(value)}`,'_blank'); break;
    case 'maps': window.open(`https://maps.google.com/?q=${encodeURIComponent(value)}`,'_blank'); break;
    case 'email': window.location.href=`mailto:${value}`; break;
    case 'weather': break;
    case 'youtube': window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(value)}`,'_blank'); break;
    case 'calendar': window.open(`https://calendar.google.com/`,'_blank'); break;
    case 'reminder': showToast('Reminder: '+value.slice(0,40)); break;
  }
}
function parseAlarmHour(str) { const m=str.match(/(\d{1,2})/); return m?parseInt(m[1]):7; }
function parseAlarmMin(str)  { const m=str.match(/\d{1,2}:(\d{2})/); return m?parseInt(m[1]):0; }

/* ── Render ───────────────────────────────────────────── */
function hideWelcome() {
  if (welcomed) return; welcomed=true;
  const w=document.getElementById('welcomeScreen');
  if (w) { w.style.transition='opacity 0.4s'; w.style.opacity='0'; setTimeout(()=>w.remove(),400); }
}

function addUserMessage(text) {
  const w=makeWrap('user');
  w.innerHTML=`<div class="msg-bubble">${escHtml(text)}</div><div class="msg-time">${nowTime()}</div>`;
  document.getElementById('chatArea').appendChild(w); scrollBottom();
}
function addUserMessageDirect(text, time) {
  const w=makeWrap('user');
  w.innerHTML=`<div class="msg-bubble">${escHtml(text)}</div><div class="msg-time">${time||''}</div>`;
  document.getElementById('chatArea').appendChild(w);
}
function addGaiaMessage(data) {
  const w=makeWrap('gaia');
  const d=data.display||data.speak||'';
  w.innerHTML=`<div class="msg-bubble">${formatResponse(d)}${buildActionTag(data.action,data.value)}</div><div class="msg-time">${nowTime()}</div>`;
  document.getElementById('chatArea').appendChild(w); scrollBottom(); setState('idle');
}
function addGaiaMessageDirect(data, time) {
  const w=makeWrap('gaia');
  const d=data.display||data.speak||'';
  w.innerHTML=`<div class="msg-bubble">${formatResponse(d)}${buildActionTag(data.action,data.value)}</div><div class="msg-time">${time||''}</div>`;
  document.getElementById('chatArea').appendChild(w);
}
function makeWrap(role) { const w=document.createElement('div'); w.className='msg-wrap '+role; return w; }

function buildActionTag(action, value) {
  if (!action||action==='none'||!value) return '';
  const icons = {
    open_url:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
    search:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
    call:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 5.45 5.45l1.8-1.8a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/></svg>`,
    maps:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 19-9-9 19-2-8-8-2z"/></svg>`,
    music:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
    send_whatsapp:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
    alarm:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/><path d="M12 10v3l2 2"/></svg>`,
    timer:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  };
  const icon=icons[action]||icons['open_url'];
  const short=value.length>38?value.slice(0,38)+'…':value;
  return `<div class="action-tag">${icon}<span>${action.replace(/_/g,' ')}: ${escHtml(short)}</span></div>`;
}

function addThinking() {
  const area=document.getElementById('chatArea'), w=document.createElement('div');
  const id='think-'+Date.now(); w.id=id; w.className='msg-wrap gaia thinking-wrap';
  w.innerHTML=`<div class="thinking-bubble"><span></span><span></span><span></span></div>`;
  area.appendChild(w); scrollBottom(); return id;
}
function removeThinking(id) { const el=document.getElementById(id); if(el) el.remove(); }

function formatResponse(text) {
  let t=escHtml(text);
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/^\d+\.\s(.+)/gm,'<li>$1</li>');
  t=t.replace(/(<li>.*<\/li>)/s,'<ol>$1</ol>');
  t=t.replace(/^[-•]\s(.+)/gm,'<li>$1</li>');
  t=t.replace(/^([A-Z][A-Za-z\s]{2,30}):$/gm,'<div class="section-head">$1</div>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\n\n+/g,'</p><p>');
  t=t.replace(/\n/g,'<br>');
  return `<p>${t}</p>`;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function nowTime() { const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }
function scrollBottom() { const a=document.getElementById('chatArea'); requestAnimationFrame(()=>{a.scrollTop=a.scrollHeight;}); }

function setState(s) {
  const dot=document.getElementById('liveDot'), label=document.getElementById('stateLabel');
  dot.className='live-dot'+(s==='idle'?'':' '+s);
  label.textContent={idle:'Online',listening:'Listening',thinking:'Thinking…',speaking:'Speaking'}[s]||'Online';
}
function setTranscript(text) { const el=document.getElementById('transcriptStrip'); el.textContent=text; el.classList.toggle('show',!!text); }
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
