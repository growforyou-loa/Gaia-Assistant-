<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="theme-color" content="#030b0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Gaia"/>
<link rel="manifest" href="manifest.json"/>
<title>Gaia — Gajanan's Personal AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>

/* ═══════════════════════════════════════════════════════════
   GAIA — Design System
   Aesthetic: Deep-ocean bioluminescent / Neural dark matter
   Palette: Near-black + electric teal + ember gold accents
   Owner: Gajanan | growforyou.in
═══════════════════════════════════════════════════════════ */

:root {
  /* Core palette */
  --void:       #030b0f;
  --abyss:      #060f15;
  --depth:      #0a1820;
  --surface:    #0e2030;
  --glass:      rgba(14, 32, 48, 0.7);
  --glass-light:rgba(255,255,255,0.03);

  /* Teal spectrum */
  --teal-dim:   #0a4a5a;
  --teal:       #0097b2;
  --teal-mid:   #00bcd4;
  --teal-bright:#00e5f5;
  --teal-glow:  rgba(0, 229, 245, 0.15);
  --teal-edge:  rgba(0, 229, 245, 0.25);

  /* Accents */
  --gold:       #c8963c;
  --gold-light: #e8b060;
  --ember:      rgba(200,150,60,0.12);
  --green-sig:  #00d4a0;
  --red-sig:    #e05050;
  --white-dim:  rgba(255,255,255,0.55);
  --white-mid:  rgba(255,255,255,0.75);
  --white-full: rgba(255,255,255,0.92);

  /* Typography */
  --font-display: 'Syne', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  /* Spacing */
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ── Reset ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  height: 100%; width: 100%;
  background: var(--void);
  color: var(--white-full);
  font-family: var(--font-body);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── Deep Background Layers ─────────────────────── */
#bg-layers {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* Noise grain texture */
#bg-layers::before {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
}

/* Radial depth gradient */
#bg-layers::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,150,178,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,100,130,0.06) 0%, transparent 50%),
    linear-gradient(180deg, var(--void) 0%, var(--abyss) 100%);
}

/* Floating particle canvas */
#particleCanvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.6;
}

/* ═══════════════════════════════════════════════════════════
   APP SHELL
═══════════════════════════════════════════════════════════ */
#app {
  position: relative; z-index: 1;
  height: 100dvh;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  grid-template-areas: "header" "chat" "composer" "footer";
  max-width: 520px;
  margin: 0 auto;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ═══════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════ */
#header {
  grid-area: header;
  padding: 14px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(0, 229, 245, 0.07);
  position: relative;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  background: rgba(3, 11, 15, 0.6);
}

/* Top edge line */
#header::after {
  content: '';
  position: absolute; bottom: -1px; left: 20px; right: 20px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--teal-mid), transparent);
  opacity: 0.3;
}

.brand {
  display: flex; align-items: center; gap: 13px;
}

/* GAIA Logo Mark — geometric neural orb */
.brand-mark {
  position: relative;
  width: 40px; height: 40px;
  flex-shrink: 0;
}

.brand-mark svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 8px rgba(0,229,245,0.5));
}

.brand-text { line-height: 1.1; }
.brand-name {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 800;
  letter-spacing: -0.5px;
  color: var(--white-full);
  background: linear-gradient(135deg, #ffffff 0%, var(--teal-bright) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.brand-sub {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 300;
  letter-spacing: 2.5px;
  color: var(--teal); text-transform: uppercase;
  margin-top: 1px;
}

/* Header right controls */
.header-controls {
  display: flex; align-items: center; gap: 10px;
}

.ctrl-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 10px; border-radius: 20px;
  border: 1px solid rgba(0,229,245,0.12);
  background: rgba(0,229,245,0.04);
}

.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green-sig);
  box-shadow: 0 0 6px var(--green-sig);
  animation: livePulse 2.4s ease-in-out infinite;
}
@keyframes livePulse {
  0%,100%{ opacity:1; transform:scale(1); }
  50%    { opacity:0.35; transform:scale(0.7); }
}
.live-dot.listening { background:var(--red-sig); box-shadow:0 0 8px var(--red-sig); animation:fastLive 0.5s ease-in-out infinite; }
.live-dot.thinking  { background:var(--gold-light); box-shadow:0 0 8px var(--gold-light); animation:fastLive 0.6s ease-in-out infinite; }
.live-dot.speaking  { background:var(--teal-bright); box-shadow:0 0 8px var(--teal-bright); animation:fastLive 0.3s ease-in-out infinite; }
@keyframes fastLive { 0%,100%{opacity:1;}50%{opacity:0.2;} }

.ctrl-label {
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 1.5px;
  color: var(--white-dim); text-transform: uppercase;
}

#clockDisplay {
  font-family: var(--font-mono);
  font-size: 13px; font-weight: 400;
  color: var(--teal-mid); letter-spacing: 1px;
}

/* ═══════════════════════════════════════════════════════════
   CHAT AREA
═══════════════════════════════════════════════════════════ */
#chatArea {
  grid-area: chat;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 20px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 0;
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: rgba(0,229,245,0.1) transparent;
}
#chatArea::-webkit-scrollbar { width: 2px; }
#chatArea::-webkit-scrollbar-thumb { background: rgba(0,229,245,0.15); border-radius: 1px; }

/* ── Message Wrapper ─────────────────────────────── */
.msg-wrap {
  display: flex;
  flex-direction: column;
  margin-bottom: 20px;
  animation: msgReveal 0.4s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes msgReveal {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.msg-wrap.user  { align-items: flex-end; }
.msg-wrap.gaia  { align-items: flex-start; }

/* ── Sender Label ──────────────────────────────── */
.msg-sender {
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 500;
  letter-spacing: 2.5px; text-transform: uppercase;
  margin-bottom: 5px;
  padding: 0 4px;
  display: flex; align-items: center; gap: 6px;
}
.msg-wrap.user .msg-sender  { color: var(--teal); }
.msg-wrap.gaia .msg-sender  { color: var(--gold); }

.sender-icon {
  width: 14px; height: 14px; opacity: 0.8;
}

/* ── Bubble ──────────────────────────────────────── */
.msg-bubble {
  position: relative;
  max-width: 88%;
  padding: 13px 16px;
  border-radius: 2px;
  font-size: 14.5px;
  line-height: 1.7;
  font-weight: 400;
  letter-spacing: 0.1px;
}

/* User bubble — right aligned, teal tinted */
.msg-wrap.user .msg-bubble {
  background: linear-gradient(135deg,
    rgba(0,150,178,0.18) 0%,
    rgba(0,100,130,0.12) 100%);
  border: 1px solid rgba(0,229,245,0.2);
  border-radius: 16px 4px 16px 16px;
  color: var(--white-full);
}

/* Gaia bubble — left aligned, deep surface */
.msg-wrap.gaia .msg-bubble {
  background: linear-gradient(145deg,
    rgba(14,32,48,0.95) 0%,
    rgba(10,24,36,0.9) 100%);
  border: 1px solid rgba(0,229,245,0.1);
  border-left: 2px solid rgba(0,229,245,0.35);
  border-radius: 4px 16px 16px 16px;
  color: var(--white-mid);
  backdrop-filter: blur(10px);
}

/* Top shimmer line on gaia bubble */
.msg-wrap.gaia .msg-bubble::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,
    var(--teal-dim), var(--teal-mid) 40%, transparent 80%);
  opacity: 0.4; border-radius: 4px 16px 0 0;
}

/* ── Bubble inner text formatting ────────────────── */
.msg-bubble p { margin-bottom: 10px; }
.msg-bubble p:last-child { margin-bottom: 0; }

.msg-bubble strong {
  color: var(--white-full);
  font-weight: 600;
}

.msg-bubble .section-head {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--teal-mid);
  margin: 14px 0 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(0,229,245,0.1);
}
.msg-bubble .section-head:first-child { margin-top: 0; }

.msg-bubble ul, .msg-bubble ol {
  padding-left: 18px; margin-bottom: 10px;
}
.msg-bubble li { margin-bottom: 5px; }

.msg-bubble code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: rgba(0,229,245,0.07);
  border: 1px solid rgba(0,229,245,0.12);
  padding: 1px 5px; border-radius: 3px;
  color: var(--teal-bright);
}

/* ── Action Tag ──────────────────────────────────── */
.action-tag {
  display: inline-flex; align-items: center; gap: 7px;
  margin-top: 10px; padding: 6px 12px;
  background: rgba(200,150,60,0.08);
  border: 1px solid rgba(200,150,60,0.2);
  border-radius: 4px;
  font-family: var(--font-mono); font-size: 10px;
  color: var(--gold-light); letter-spacing: 1px;
  cursor: pointer; transition: background 0.2s;
}
.action-tag:active { background: rgba(200,150,60,0.15); }
.action-tag svg { width:12px; height:12px; flex-shrink:0; }

/* ── Timestamp ───────────────────────────────────── */
.msg-time {
  font-family: var(--font-mono);
  font-size: 8.5px; letter-spacing: 1px;
  color: rgba(255,255,255,0.2);
  margin-top: 4px; padding: 0 4px;
}

/* ── Thinking Indicator ──────────────────────────── */
.thinking-wrap {
  align-items: flex-start;
}
.thinking-bubble {
  background: linear-gradient(145deg, rgba(14,32,48,0.9), rgba(10,24,36,0.85));
  border: 1px solid rgba(0,229,245,0.1);
  border-left: 2px solid rgba(0,229,245,0.25);
  border-radius: 4px 16px 16px 16px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 5px;
}
.thinking-bubble span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--teal-mid);
  animation: thinkBounce 1.4s ease-in-out infinite;
}
.thinking-bubble span:nth-child(2) { animation-delay: 0.18s; background: var(--teal-bright); }
.thinking-bubble span:nth-child(3) { animation-delay: 0.36s; background: var(--teal); }
@keyframes thinkBounce {
  0%,80%,100%{ transform:translateY(0); opacity:0.3; }
  40%        { transform:translateY(-7px); opacity:1; }
}

/* ── Welcome Screen ──────────────────────────────── */
#welcomeScreen {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px;
  height: 100%;
  animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes fadeUp {
  from{ opacity:0; transform:translateY(24px); }
  to  { opacity:1; transform:translateY(0); }
}

.welcome-orb {
  width: 90px; height: 90px; margin-bottom: 22px;
  position: relative;
}

.welcome-orb svg {
  width:100%; height:100%;
  filter: drop-shadow(0 0 20px rgba(0,229,245,0.35));
  animation: orbFloat 4s ease-in-out infinite;
}
@keyframes orbFloat {
  0%,100%{ transform:translateY(0) scale(1); filter:drop-shadow(0 0 20px rgba(0,229,245,0.35)); }
  50%    { transform:translateY(-6px) scale(1.02); filter:drop-shadow(0 0 30px rgba(0,229,245,0.55)); }
}

.welcome-title {
  font-family: var(--font-display);
  font-size: 32px; font-weight: 800;
  background: linear-gradient(135deg, #ffffff 30%, var(--teal-bright) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 8px;
}

.welcome-sub {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: 3px;
  color: var(--teal); text-transform: uppercase; margin-bottom: 20px;
}

.welcome-desc {
  font-size: 14px; line-height: 1.7;
  color: var(--white-dim); max-width: 300px; margin-bottom: 28px;
}

/* Capability cards */
.cap-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; width: 100%; max-width: 340px;
}
.cap-card {
  background: rgba(14,32,48,0.7);
  border: 1px solid rgba(0,229,245,0.1);
  border-radius: 10px; padding: 12px;
  text-align: left; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.cap-card:active {
  border-color: rgba(0,229,245,0.3);
  background: rgba(0,150,178,0.1);
}
.cap-icon { margin-bottom: 7px; }
.cap-icon svg { width:18px; height:18px; color:var(--teal-mid); }
.cap-label {
  font-family: var(--font-display);
  font-size: 12px; font-weight: 700;
  color: var(--white-full); margin-bottom: 3px;
}
.cap-desc {
  font-size: 11px; color: var(--white-dim); line-height: 1.4;
}

/* ═══════════════════════════════════════════════════════════
   COMPOSER
═══════════════════════════════════════════════════════════ */
#composer {
  grid-area: composer;
  padding: 10px 14px 8px;
  background: rgba(3,11,15,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(0,229,245,0.07);
  position: relative;
}
#composer::before {
  content: '';
  position: absolute; top: -1px; left: 14px; right: 14px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,229,245,0.2), transparent);
}

/* ── Voice Visualizer Bar ────────────────────────── */
#voiceBar {
  height: 32px; margin-bottom: 8px;
  display: none; align-items: center; justify-content: center; gap: 2px;
}
#voiceBar.active { display: flex; }
.vbar {
  width: 3px; border-radius: 2px;
  background: var(--teal-mid);
  animation: vbarDance 0.8s ease-in-out infinite;
  transform-origin: bottom;
}
.vbar:nth-child(1){ height:8px;  animation-delay:0s; }
.vbar:nth-child(2){ height:16px; animation-delay:0.07s; background:var(--teal-bright); }
.vbar:nth-child(3){ height:24px; animation-delay:0.14s; }
.vbar:nth-child(4){ height:18px; animation-delay:0.21s; background:var(--teal-bright); }
.vbar:nth-child(5){ height:28px; animation-delay:0.28s; }
.vbar:nth-child(6){ height:20px; animation-delay:0.35s; background:var(--teal-bright); }
.vbar:nth-child(7){ height:14px; animation-delay:0.42s; }
.vbar:nth-child(8){ height:24px; animation-delay:0.49s; background:var(--teal-bright); }
.vbar:nth-child(9){ height:10px; animation-delay:0.56s; }
@keyframes vbarDance {
  0%,100%{ transform:scaleY(0.3); opacity:0.5; }
  50%    { transform:scaleY(1);   opacity:1;   }
}

/* ── Transcript strip ─────────────────────────────── */
#transcriptStrip {
  font-family: var(--font-mono);
  font-size: 11px; color: var(--teal-mid); letter-spacing: 0.5px;
  text-align: center; padding: 0 10px 6px;
  min-height: 18px; opacity: 0; transition: opacity 0.3s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#transcriptStrip.show { opacity: 1; }

/* ── Input Row ────────────────────────────────────── */
.input-row {
  display: flex; align-items: flex-end; gap: 8px;
}

/* Main textarea */
#textInput {
  flex: 1;
  background: rgba(14,32,48,0.8);
  border: 1px solid rgba(0,229,245,0.12);
  border-radius: 14px;
  padding: 12px 14px;
  font-family: var(--font-body); font-size: 14px;
  font-weight: 400; color: var(--white-full);
  outline: none; resize: none;
  min-height: 46px; max-height: 120px;
  line-height: 1.5; overflow-y: auto;
  transition: border-color 0.25s, box-shadow 0.25s;
  scrollbar-width: none;
}
#textInput::-webkit-scrollbar { display: none; }
#textInput::placeholder { color: rgba(255,255,255,0.25); }
#textInput:focus {
  border-color: rgba(0,229,245,0.3);
  box-shadow: 0 0 0 3px rgba(0,229,245,0.06), inset 0 0 20px rgba(0,150,178,0.04);
}

/* Action buttons */
.act-btn {
  width: 46px; height: 46px; border-radius: 13px;
  border: 1px solid rgba(0,229,245,0.12);
  background: rgba(14,32,48,0.8);
  color: var(--teal-mid); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.act-btn svg { width:20px; height:20px; pointer-events:none; }
.act-btn:active { transform:scale(0.91); }

.act-btn.send {
  background: linear-gradient(135deg, rgba(0,150,178,0.4), rgba(0,80,110,0.5));
  border-color: rgba(0,229,245,0.3);
  box-shadow: 0 0 16px rgba(0,229,245,0.12);
  color: var(--teal-bright);
}
.act-btn.send:active { box-shadow: 0 0 24px rgba(0,229,245,0.3); }

.act-btn.mic-btn.active {
  background: linear-gradient(135deg, rgba(224,80,80,0.3), rgba(160,30,30,0.4));
  border-color: rgba(224,80,80,0.5); color: var(--red-sig);
  box-shadow: 0 0 16px rgba(224,80,80,0.2);
  animation: micGlow 0.7s ease-in-out infinite;
}
@keyframes micGlow {
  0%,100%{ box-shadow:0 0 16px rgba(224,80,80,0.2); }
  50%    { box-shadow:0 0 28px rgba(224,80,80,0.45); }
}

/* ── Quick Actions ───────────────────────────────── */
#quickStrip {
  display: flex; gap: 6px; margin-top: 9px;
  overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none;
}
#quickStrip::-webkit-scrollbar { display: none; }

.q-chip {
  flex-shrink: 0; display: flex; align-items: center; gap: 5px;
  padding: 5px 11px; border-radius: 20px;
  background: rgba(14,32,48,0.7);
  border: 1px solid rgba(0,229,245,0.09);
  font-size: 11.5px; font-weight: 400;
  color: rgba(255,255,255,0.55); cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.q-chip svg { width:11px; height:11px; flex-shrink:0; }
.q-chip:active {
  border-color: rgba(0,229,245,0.3); color: var(--teal-bright);
  background: rgba(0,150,178,0.1);
}

/* ═══════════════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════════════ */
#footer {
  grid-area: footer;
  text-align: center; padding: 5px 0 6px;
  border-top: 1px solid rgba(0,229,245,0.04);
  background: rgba(3,11,15,0.7);
}
#footer span {
  font-family: var(--font-mono);
  font-size: 8.5px; letter-spacing: 2.5px;
  color: rgba(255,255,255,0.18); text-transform: uppercase;
}
#footer a { color: var(--teal-dim); text-decoration: none; }

/* ═══════════════════════════════════════════════════════════
   TOAST NOTIFICATION

}

  opacity: 1; transform: translateX(-50%) translateY(0);

<script>
'use strict';

/* ── Config ──────────────────────────────────────────────────── */
const CFG = {
  backend:    'https://your-gaia-api.onrender.com', // ← UPDATE AFTER RENDER DEPLOY

  assistant:  'Gaia',

/* ── State ───────────────────────────────────────────────────── */
let recognition   = null;
let isListening   = false;
let isSpeaking    = false;
let chatHistory   = [];
let voiceReady    = false;
let selectedVoice = null;
let welcomed      = false;

/* ── Capability Cards ────────────────────────────────────────── */
const CAPS = [

    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,

  },

    label: 'Alarms & Timers', desc: 'Set alarms, countdowns, reminders', cmd: 'Set alarm for 7 AM tomorrow'
  },
  {
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`,
    label: 'Voice & Music', desc: 'Speak freely, play any music', cmd: 'Play something relaxing'
  },

/* ── Quick Chips ────────────────────────────────────────────── */
const QUICK = [
  { icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`, label: 'Weather', cmd: 'What is the weather today' },
  { icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`, label: 'Search', cmd: 'Search latest news today' },
  { icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m3 11 19-9-9 19-2-8-8-2z"/></svg>`, label: 'Navigate', cmd: 'Navigate to nearest hospital' },
  { icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`, label: 'Email', cmd: 'Help me write an email' },
  { icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`, label: 'Ask anything', cmd: 'Tell me something interesting' },
];

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  initClock();
  initParticles();
  initSpeech();
  initVoiceRecog();
  buildCapCards();
  buildQuickChips();
  autoResizeTextarea();
  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
});

/* ── Clock ───────────────────────────────────────────────────── */
function initClock() {
  const tick = () => {
    const n = new Date();
    const h = String(n.getHours()).padStart(2,'0');
    const m = String(n.getMinutes()).padStart(2,'0');
    document.getElementById('clockDisplay').textContent = `${h}:${m}`;
  };
  tick(); setInterval(tick, 15000);
}

/* ── Particle Canvas ─────────────────────────────────────────── */
function initParticles() {
  const canvas = document.getElementById('particleCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];

  const resize = () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  };
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 55; i++) {
    particles.push({
      x: Math.random() * 800,
      y: Math.random() * 900,
      r: Math.random() * 1.2 + 0.2,
      vx: (Math.random() - 0.5) * 0.15,
      vy: -Math.random() * 0.2 - 0.05,
      alpha: Math.random() * 0.5 + 0.1,
    });
  }

  const draw = () => {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x % W, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0, 200, 220, ${p.alpha})`;
      ctx.fill();
      p.x += p.vx; p.y += p.vy;
      if (p.y < -5) { p.y = H + 5; p.x = Math.random() * W; }
    });
    requestAnimationFrame(draw);
  };
  draw();
}

/* ── Capability Cards ────────────────────────────────────────── */
function buildCapCards() {
  const grid = document.getElementById('capGrid');
  CAPS.forEach(cap => {
    const card = document.createElement('div');
    card.className = 'cap-card';
    card.innerHTML = `
      <div class="cap-icon">${cap.icon}</div>
      <div class="cap-label">${cap.label}</div>
      <div class="cap-desc">${cap.desc}</div>`;
    card.onclick = () => processCommand(cap.cmd);
    grid.appendChild(card);
  });
}

/* ── Quick Chips ─────────────────────────────────────────────── */
function buildQuickChips() {
  const strip = document.getElementById('quickStrip');
  QUICK.forEach(q => {
    const chip = document.createElement('button');
    chip.className = 'q-chip';
    chip.innerHTML = `${q.icon}<span>${q.label}</span>`;
    chip.onclick = () => processCommand(q.cmd);
    strip.appendChild(chip);
  });
}

/* ── Auto-resize textarea ────────────────────────────────────── */
function autoResizeTextarea() {
  const el = document.getElementById('textInput');
  el.addEventListener('input', () => {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  });
}

/* ════════════════════════════════════════════════════════════
   SPEECH — TTS
════════════════════════════════════════════════════════════ */
function initSpeech() {
  const setV = () => {
    const vs = speechSynthesis.getVoices();
    selectedVoice =
      vs.find(v => /samantha|karen|victoria|moira|female|woman|zira/i.test(v.name) && /en/i.test(v.lang)) ||
      vs.find(v => /en-us|en-gb|en-in/i.test(v.lang)) ||
      vs[0] || null;
    voiceReady = true;
  };
  setV();
  speechSynthesis.onvoiceschanged = setV;
}

function speak(text) {
  if (!text || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  if (selectedVoice) utt.voice = selectedVoice;
  utt.rate = 1.05; utt.pitch = 1.0; utt.volume = 1.0;
  utt.onstart = () => { isSpeaking = true; setState('speaking'); };
  utt.onend = utt.onerror = () => { isSpeaking = false; setState('idle'); };
  speechSynthesis.speak(utt);
}

/* ════════════════════════════════════════════════════════════
   SPEECH — STT
════════════════════════════════════════════════════════════ */
function initVoiceRecog() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Voice input not available in this browser'); return; }
  recognition = new SR();
  recognition.lang = 'en-IN';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true; setState('listening');
    document.getElementById('voiceBar').classList.add('active');
    document.getElementById('micBtn').classList.add('active');
    setTranscript('Listening...');
  };

  recognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    setTranscript(final || interim);
    if (final) processCommand(final.trim());
  };

  recognition.onerror = e => {
    stopListening();
    if (e.error !== 'no-speech' && e.error !== 'aborted')
      showToast('Mic error: ' + e.error);
  };

  recognition.onend = stopListening;
}

function stopListening() {
  isListening = false;
  setState('idle');
  document.getElementById('voiceBar').classList.remove('active');
  document.getElementById('micBtn').classList.remove('active');
  setTimeout(() => setTranscript(''), 1200);
}

function toggleMic() {
  if (!recognition) { showToast('Voice not supported in this browser'); return; }
  if (isListening) {
    recognition.abort();
  } else {
    if (isSpeaking) speechSynthesis.cancel();
    try { recognition.start(); } catch(e) {}
  }
}

/* ════════════════════════════════════════════════════════════
   CORE COMMAND FLOW
════════════════════════════════════════════════════════════ */
async function sendText() {
  const el   = document.getElementById('textInput');
  const text = el.value.trim();
  if (!text) return;
  el.value = ''; el.style.height = '';
  processCommand(text);
}

async function processCommand(text) {
  if (!text) return;
  hideWelcome();
  addUserMessage(text);
  setState('thinking');
  const thinkId = addThinking();

  try {
    const res = await fetch(`${CFG.backend}/command`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        history: chatHistory.slice(-CFG.maxHistory),
        owner: CFG.owner
      })
    });

    removeThinking(thinkId);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Store conversation history
    chatHistory.push({ role: 'user', content: text });
    chatHistory.push({ role: 'assistant', content: data.speak || data.display || '' });
    if (chatHistory.length > CFG.maxHistory) chatHistory = chatHistory.slice(-CFG.maxHistory);

    addGaiaMessage(data);
    speak(data.speak);
    setTimeout(() => handleAction(data.action, data.value, data), 900);

  } catch (err) {
    removeThinking(thinkId);
    const fallback = { speak: "I'm having trouble connecting. Please check your connection.", display: "Connection error. Make sure the backend is running and the URL is correct." };
    addGaiaMessage(fallback);
    speak(fallback.speak);
    setState('idle');
  }
}

/* ════════════════════════════════════════════════════════════
   ACTION HANDLER — Phone integrations
════════════════════════════════════════════════════════════ */
function handleAction(action, value, data) {
  if (!action || action === 'none' || !value) return;

  switch (action) {
    case 'open_url':
      window.open(value.startsWith('http') ? value : `https://${value}`, '_blank');
      break;

    case 'search':
      window.open(`https://www.google.com/search?q=${encodeURIComponent(value)}`, '_blank');
      break;

    case 'call':
      // Native phone dialer — triggers on real device
      window.location.href = `tel:${value.replace(/[^0-9+]/g, '')}`;
      break;

    case 'send_whatsapp': {
      const num = value.replace(/[^0-9+]/g, '');
      window.open(`https://wa.me/${num}`, '_blank');
      break;
    }

    case 'send_sms':
      window.location.href = `sms:${value.replace(/[^0-9+]/g, '')}`;
      break;

    case 'alarm':
      // Android: opens clock app via intent deep-link
      // iOS: can only prompt user since alarm APIs are restricted
      showToast('Alarm: ' + value);
      try {
        window.location.href = `intent://alarm?hour=${parseAlarmHour(value)}&minutes=${parseAlarmMin(value)}&message=Gaia%20Alarm#Intent;scheme=android-app;package=com.google.android.deskclock;end`;
      } catch(e) {
        showToast('Open your clock app and set: ' + value);
      }
      break;

    case 'timer': {
      const secs = parseInt(value) || 60;
      try {
        window.location.href = `intent://timer?seconds=${secs}#Intent;scheme=android-app;package=com.google.android.deskclock;end`;
      } catch(e) {}
      showToast('Timer: ' + secs + ' seconds');
      break;
    }

    case 'music':
      window.open(`https://open.spotify.com/search/${encodeURIComponent(value)}`, '_blank');
      break;

    case 'maps':
      window.open(`https://maps.google.com/?q=${encodeURIComponent(value)}`, '_blank');
      break;

    case 'email':
      window.location.href = `mailto:${value}`;
      break;

    case 'weather':
      // Backend fetches and returns weather in the response — no redirect needed
      break;

    case 'youtube':
      window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(value)}`, '_blank');
      break;

    case 'calendar':
      window.open(`https://calendar.google.com/`, '_blank');
      break;

    case 'reminder':
      showToast('Reminder saved: ' + value.slice(0, 40));
      break;
  }
}

/* Parse time string for alarm intent */
function parseAlarmHour(str) {
  const m = str.match(/(\d{1,2})/);
  return m ? parseInt(m[1]) : 7;
}
function parseAlarmMin(str) {
  const m = str.match(/\d{1,2}:(\d{2})/);
  return m ? parseInt(m[1]) : 0;
}

/* ════════════════════════════════════════════════════════════

════════════════════════════════════════════════════════════ */
function hideWelcome() {
  if (welcomed) return;

  const w = document.getElementById('welcomeScreen');
  if (w) { w.style.transition = 'opacity 0.3s'; w.style.opacity = '0'; setTimeout(() => w.remove(), 300); }

function addUserMessage(text) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user';
  wrap.innerHTML = `
    <div class="msg-sender">
      <svg class="sender-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>${CFG.owner}</span>
    </div>
    <div class="msg-bubble">${escHtml(text)}</div>
    <div class="msg-time">${nowTime()}</div>`;
  area.appendChild(wrap);
  scrollBottom();
}

function addGaiaMessage(data) {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap gaia';

  const displayText = data.display || data.speak || '';
  const actionHtml  = buildActionTag(data.action, data.value);

  wrap.innerHTML = `
    <div class="msg-sender">
      <svg class="sender-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>${CFG.assistant}</span>
    </div>
    <div class="msg-bubble">${formatResponse(displayText)}${actionHtml}</div>
    <div class="msg-time">${nowTime()}</div>`;

  area.appendChild(wrap);
  scrollBottom();
  setState('idle');
}

function buildActionTag(action, value) {
  if (!action || action === 'none' || !value) return '';
  const icons = {
    open_url:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,
    search:        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
    call:          `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 5.45 5.45l1.8-1.8a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.02z"/></svg>`,
    maps:          `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 19-9-9 19-2-8-8-2z"/></svg>`,
    music:         `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
    send_whatsapp: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
    alarm:         `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/><path d="M6.38 18.7 4 21"/><path d="M17.64 18.67 20 21"/><path d="M12 10v3l2 2"/></svg>`,
    timer:         `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  };
  const icon = icons[action] || icons['open_url'];
  const label = action.replace(/_/g,' ').toUpperCase();
  const short = value.length > 38 ? value.slice(0, 38) + '…' : value;
  return `<div class="action-tag">${icon}<span>${label}: ${escHtml(short)}</span></div>`;
}

function addThinking() {
  const area = document.getElementById('chatArea');
  const wrap = document.createElement('div');
  const id   = 'think-' + Date.now();
  wrap.id    = id;
  wrap.className = 'msg-wrap gaia thinking-wrap';
  wrap.innerHTML = `
    <div class="msg-sender">
      <svg class="sender-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Gaia</span>
    </div>
    <div class="thinking-bubble"><span></span><span></span><span></span></div>`;
  area.appendChild(wrap);
  scrollBottom();
  return id;
}

function removeThinking(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

/* ── Format long AI responses ────────────────────────────────── */
function formatResponse(text) {
  // Convert markdown-style to HTML for richer display
  let t = escHtml(text);
  // Bold **text**
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Numbered list
  t = t.replace(/^\d+\.\s(.+)/gm, '<li>$1</li>');
  t = t.replace(/(<li>.*<\/li>)/s, '<ol>$1</ol>');
  // Bullet list
  t = t.replace(/^[-•]\s(.+)/gm, '<li>$1</li>');
  // Section headers (lines ending with colon or ALL CAPS short line)
  t = t.replace(/^([A-Z][A-Za-z\s]{2,30}):$/gm, '<div class="section-head">$1</div>');
  // Code `inline`
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Paragraphs from double newlines
  t = t.replace(/\n\n+/g, '</p><p>');
  t = t.replace(/\n/g, '<br>');
  return `<p>${t}</p>`;
}

/* ── Helpers ──────────────────────────────────────────────────── */
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function nowTime() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  return `${h}:${m}`;
}

function scrollBottom() {
  const area = document.getElementById('chatArea');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; });
}

/* ── State Management ────────────────────────────────────────── */
function setState(s) {
  const dot   = document.getElementById('liveDot');
  const label = document.getElementById('stateLabel');
  dot.className = 'live-dot ' + (s === 'idle' ? '' : s);
  const labels = { idle:'Online', listening:'Listening', thinking:'Thinking', speaking:'Speaking' };
  label.textContent = labels[s] || 'Online';
}

function setTranscript(text) {
  const el = document.getElementById('transcriptStrip');
  el.textContent = text;
  el.classList.toggle('show', !!text);
}

/* ── Toast ───────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3200);
}
</script>
