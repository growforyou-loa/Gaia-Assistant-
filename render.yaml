services:
  - type: web
    name: aria-assistant-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENWEATHER_KEY
        sync: false
    healthCheckPath: /ping
    autoDeploy: true
    
